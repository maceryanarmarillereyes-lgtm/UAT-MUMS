<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MUMS — Preparing Workspace</title>

<!-- ★ PRISM GUARD 1: Runs BEFORE anything else loads.
     If no valid PIN session → immediately redirect to login.
     Uses only sessionStorage (no external deps needed). -->
<script>
(function prismGuard(){
  try {
    var pinOk    = sessionStorage.getItem('mums_pin_ok') === '1';
    var pinTs    = Number(sessionStorage.getItem('mums_pin_ts') || '0');
    var pinFresh = (Date.now() - pinTs) < 300000; // 5 min window
    if (!pinOk || !pinFresh) {
      sessionStorage.clear();
      document.documentElement.style.display = 'none';
      location.replace('./login.html');
    }
  } catch(e) {
    location.replace('./login.html');
  }
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root { --spring: cubic-bezier(0.175,0.885,0.32,1.275); --ease: cubic-bezier(0.22,1,0.36,1); }
* { -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif; background:#0a0a0f; color:#fff; overflow:hidden; }
body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }

/* Ambient */
.bg-fixed { position:fixed; inset:0; background:linear-gradient(180deg,#0a0a0f 0%,#0d0f15 40%,#10131c 100%); }
.orb { will-change:transform; position:fixed; border-radius:50%; pointer-events:none; filter:blur(90px); }
.orb1 { top:-12rem; left:-12rem; width:680px; height:680px; opacity:.7; background:radial-gradient(circle,rgba(59,130,246,.22) 0%,transparent 60%); animation:float1 22s ease-in-out infinite; }
.orb2 { bottom:-12rem; right:-12rem; width:620px; height:620px; opacity:.7; background:radial-gradient(circle,rgba(139,92,246,.24) 0%,transparent 60%); filter:blur(100px); animation:float2 26s ease-in-out infinite; }
.orb3 { top:50%; left:50%; width:440px; height:440px; opacity:.5; background:radial-gradient(circle,rgba(96,165,250,.18) 0%,rgba(167,139,250,.12) 50%,transparent 70%); transform:translate(-50%,-50%); animation:float3 28s ease-in-out infinite; }
.vignette { position:fixed; inset:0; pointer-events:none; background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.4) 100%); }

@keyframes float1 { 0%,100%{transform:translate3d(0,0,0) scale(1)} 50%{transform:translate3d(50px,-30px,0) scale(1.08)} }
@keyframes float2 { 0%,100%{transform:translate3d(0,0,0) scale(1)} 50%{transform:translate3d(-60px,40px,0) scale(1.05)} }
@keyframes float3 { 0%,100%{transform:translate3d(-50%,-50%,0) scale(1)} 50%{transform:translate3d(-45%,-55%,0) scale(1.1)} }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes shimmer { 0%{transform:translateX(-120%)} 100%{transform:translateX(220%)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Glass panel */
.glass {
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(40px) saturate(140%);
  -webkit-backdrop-filter:blur(40px) saturate(140%);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 30px 80px -20px rgba(0,0,0,.7),0 10px 30px -10px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 0 rgba(0,0,0,.2);
}
.panel-enter { opacity:0; transform:translateY(16px) scale(.98); }
.panel-show  { opacity:1; transform:translateY(0) scale(1); transition:all 1s var(--ease); }
#panel.completed { transform:scale(1.015); transition:transform .8s var(--spring); }

/* Welcome overlay */
#welcome {
  position:absolute; inset:0; z-index:30;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
  background:rgba(10,10,15,.7); backdrop-filter:blur(24px);
  border-radius:28px; opacity:0; pointer-events:none;
  transition:opacity .7s var(--ease);
}
#welcome.show { opacity:1; pointer-events:auto; }
.check-wrap {
  width:64px; height:64px; border-radius:50%;
  background:linear-gradient(to bottom,#60a5fa,#a78bfa);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 10px 40px rgba(96,165,250,.35),inset 0 1px 0 rgba(255,255,255,.2);
  transform:scale(.9); transition:transform .7s var(--spring);
}
#welcome.show .check-wrap { transform:scale(1); }

/* Step dots */
.step-dot {
  width:28px; height:28px; border-radius:50%;
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.45);
  display:flex; align-items:center; justify-content:center;
  transition:all .6s var(--ease);
}
.step.done .step-dot {
  background:linear-gradient(135deg,#60a5fa 0%,#a78bfa 100%);
  border-color:transparent; color:#fff;
  box-shadow:0 0 20px rgba(96,165,250,.25),inset 0 1px 0 rgba(255,255,255,.2);
}
.step.active .step-dot {
  background:rgba(255,255,255,.08);
  border-color:rgba(167,139,250,.55); color:#fff;
  box-shadow:0 0 0 4px rgba(167,139,250,.12),inset 0 0 12px rgba(167,139,250,.1);
}

/* Pill status */
.pill {
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.08);
  position:relative; overflow:hidden;
}
.pill.shimmer::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.09),transparent);
  animation:shimmer .7s var(--ease);
}

/* Progress ring */
#progress-ring { transition:stroke-dashoffset .1s linear; }

/* Fade out body on completion */
body.fade-out {
  opacity:0; transform:scale(.985); filter:blur(4px);
  transition:opacity .7s ease, transform .7s ease, filter .7s ease;
}
</style>

<script>
// ════════════════════════════════════════════════════════════════════
// PRISM BOOT — runs after DOM + scripts loaded
// Uses ONLY window.CloudAuth (cloud_auth.js) — no new supabase client
// ════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async function prismBoot() {

  // ── Animate panel in ─────────────────────────────────────────────
  const panel = document.getElementById('panel');
  setTimeout(() => panel.classList.add('panel-show'), 80);

  // ── UI helpers ───────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function setPill(id, text, color) {
    const pill = $('pill-' + id);
    const val  = $('pill-' + id + '-val');
    if (pill) { pill.classList.add('shimmer'); setTimeout(() => pill.classList.remove('shimmer'), 700); }
    if (val)  { val.style.color = color || 'rgba(255,255,255,.7)'; val.textContent = text; }
  }

  // Ring animation helpers
  const numberEl  = $('metric-number');
  const progressEl = $('progress-ring');
  const circumference = 2 * Math.PI * 56; // r=56
  progressEl.style.strokeDasharray = circumference;

  function animateRing(toValue, maxValue, durationMs) {
    const target   = Math.max(0, toValue);
    const max      = Math.max(maxValue, target) || 1;
    const startTs  = performance.now();
    const startNum = Number(numberEl.textContent) || 0;
    function tick(now) {
      const p      = Math.min((now - startTs) / durationMs, 1);
      const eased  = 1 - Math.pow(1 - p, 3);
      const cur    = Math.round(startNum + (target - startNum) * eased);
      numberEl.textContent = cur;
      progressEl.style.strokeDashoffset = circumference * (1 - (eased * (target / max)) * 0.935);
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  // Step UI helpers
  const step3     = $('step-3');
  const step4     = $('step-4');
  const step3spin = $('step3-spinner');
  const step3icon = $('step3-icon');
  const stepProg  = $('step-progress');

  function markStep3Done() {
    step3.classList.remove('active'); step3.classList.add('done');
    if (step3spin) step3spin.style.display = 'none';
    if (step3icon) step3icon.outerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="position:relative;z-index:1"><path d="M20 6L9 17l-5-5"/></svg>`;
    step3.querySelector('span').style.color = 'rgba(255,255,255,.7)';
  }

  function activateStep4() {
    if (stepProg) stepProg.style.width = '100%';
    step4.classList.add('active');
    const lbl = $('step4-label'); if (lbl) { lbl.style.color = '#fff'; }
  }

  function markStep4Done() {
    step4.classList.remove('active'); step4.classList.add('done');
    const dot = step4.querySelector('.step-dot');
    if (dot) dot.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>`;
  }

  // ── GUARD 2: Verify auth session is still valid at boot time ─────
  // Uses CloudAuth — DO NOT create a new Supabase client
  let session = null;
  let userProfile = null;

  try {
    session = window.CloudAuth && CloudAuth.loadSession && CloudAuth.loadSession();
  } catch(_) {}

  if (!session || !session.access_token) {
    // Session expired between pin.html and loader — kick back to login
    try { sessionStorage.clear(); } catch(_) {}
    document.documentElement.style.display = 'none';
    return location.replace('./login.html');
  }

  // ── STEP 1: Profile load ─────────────────────────────────────────
  setPill('profile', 'Loading…', 'rgba(255,255,255,.7)');

  try {
    const tok = CloudAuth.accessToken ? CloudAuth.accessToken() : session.access_token;
    const resp = await fetch('/api/users/me', {
      headers: { 'Authorization': 'Bearer ' + tok, 'Cache-Control': 'no-cache' }
    });
    if (resp.ok) {
      const data = await resp.json();
      userProfile = (data && data.profile) ? data.profile : data;
      setPill('profile', 'Hydrated', 'rgba(147,197,253,.9)');

      // Populate welcome name
      const name = (userProfile && (userProfile.full_name || userProfile.name || userProfile.email)) ||
                   (session.user && (session.user.user_metadata && (session.user.user_metadata.full_name || session.user.user_metadata.name) || session.user.email)) ||
                   'Team Member';
      const wn = $('welcomeName'); if (wn) wn.textContent = 'Welcome, ' + name.split(' ')[0];
    } else {
      setPill('profile', 'OK', 'rgba(255,255,255,.5)');
    }
  } catch(_) {
    setPill('profile', 'OK', 'rgba(255,255,255,.5)');
  }

  // ── STEP 2: Cache warm ───────────────────────────────────────────
  setPill('cache', 'Warming', 'rgba(167,139,250,.9)');
  let cacheWarm = false;
  try {
    // Check for existing local-first cache (Cloudflare Pages: no server-side cache)
    const hasCols = !!localStorage.getItem('mums_column_state');
    const hasUsers = !!localStorage.getItem('ums_users');
    cacheWarm = hasCols || hasUsers;
    await new Promise(r => setTimeout(r, 400)); // allow UI to repaint
    setPill('cache', cacheWarm ? 'Warm' : 'Cold', cacheWarm ? 'rgba(167,139,250,.9)' : 'rgba(255,255,255,.5)');
  } catch(_) {
    setPill('cache', 'Ready', 'rgba(255,255,255,.5)');
  }

  // ── STEP 3: Realtime connect ─────────────────────────────────────
  setPill('realtime', 'Connecting', 'rgba(255,255,255,.7)');

  // Animate ring while realtime connects (shows boot activity)
  animateRing(0, 100, 2000);

  let realtimeOk = false;
  try {
    // USE EXISTING realtime function — DO NOT create new subscription
    const rt = window.MUMS && window.MUMS.realtime;
    if (rt && typeof rt.forceReconnect === 'function') {
      rt.forceReconnect();
    } else if (rt && typeof rt.connect === 'function') {
      await Promise.race([
        rt.connect(),
        new Promise(r => setTimeout(r, 3000))
      ]);
    } else {
      // realtime not yet mounted — it will self-connect when index.html loads
      await new Promise(r => setTimeout(r, 1200));
    }
    realtimeOk = true;
    setPill('realtime', 'Connected', 'rgba(52,211,153,.9)');
  } catch(_) {
    setPill('realtime', 'Ready', 'rgba(255,255,255,.5)');
  }

  // ── STEP 3 → 4 transition ────────────────────────────────────────
  await new Promise(r => setTimeout(r, 300));
  markStep3Done();
  activateStep4();

  // Animate ring to a realistic number (placeholder — real data loads on dashboard)
  animateRing(Math.floor(Math.random() * 5) + 1, 20, 800);

  await new Promise(r => setTimeout(r, 600));
  markStep4Done();

  // ── BOOT COMPLETE ────────────────────────────────────────────────
  try {
    sessionStorage.setItem('mums_boot_complete', '1');
    sessionStorage.setItem('mums_boot_ts', Date.now().toString());
  } catch(_) {}

  // Show welcome overlay
  await new Promise(r => setTimeout(r, 200));
  panel.classList.add('completed');
  const welcome = $('welcome');
  if (welcome) welcome.classList.add('show');

  // Fade out → redirect to dashboard
  await new Promise(r => setTimeout(r, 1500));
  document.body.style.transition = 'opacity .7s ease,transform .7s ease,filter .7s ease';
  document.body.style.opacity = '0';
  document.body.style.transform = 'scale(.985)';
  document.body.style.filter = 'blur(4px)';

  await new Promise(r => setTimeout(r, 700));
  location.replace('./index.html');
});
</script>
</body>
</html>
