<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Security PIN | MUMS</title>

  <!-- ★ PRISM LOADER: Prefetch loader so it's instant when PIN passes -->
  <link rel="prefetch" href="./loader-prism.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://supabase.co">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#02040a;--surface:#0d1117;--border:rgba(255,255,255,.08);
      --text:#d0d8e4;--muted:#8b949e;--accent:#58a6ff;
      --green:#3fb950;--danger:#f85149;--font:'Plus Jakarta Sans',system-ui,sans-serif;
      --mono:'JetBrains Mono',monospace;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center}

    /* ambient */
    .bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(ellipse 55% 45% at 20% 30%,rgba(88,166,255,.09) 0%,transparent 70%),
        radial-gradient(ellipse 45% 40% at 80% 75%,rgba(139,92,246,.07) 0%,transparent 70%),
        repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.015) 40px),
        repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.015) 40px);}

    /* card */
    .card{
      position:relative;z-index:1;
      width:min(400px,calc(100vw - 32px));
      background:rgba(13,17,23,.95);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:32px 28px 28px;
      box-shadow:0 32px 80px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.04);
    }

    /* header */
    .shield{
      width:56px;height:56px;border-radius:16px;margin:0 auto 20px;
      background:linear-gradient(135deg,rgba(88,166,255,.2),rgba(139,92,246,.2));
      border:1px solid rgba(88,166,255,.3);
      display:flex;align-items:center;justify-content:center;font-size:22px;
    }
    .title{font-size:22px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px}
    .subtitle{font-size:12px;color:var(--muted);text-align:center;margin-bottom:28px}

    /* pin dots */
    .pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px}
    .dot{
      width:18px;height:18px;border-radius:50%;
      border:2px solid rgba(255,255,255,.18);
      background:transparent;
      transition:all .2s;
    }
    .dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 12px rgba(88,166,255,.5)}
    .dot.error{background:var(--danger);border-color:var(--danger);animation:shake .4s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}60%{transform:translateX(4px)}}

    /* numpad */
    .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .key{
      padding:14px 10px;border-radius:10px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
      color:#fff;font-size:18px;font-weight:700;font-family:var(--mono);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all .13s;user-select:none;-webkit-user-select:none;
    }
    .key:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.15)}
    .key:active{background:rgba(88,166,255,.18);border-color:rgba(88,166,255,.5);transform:scale(.96)}
    .key.del{font-size:14px;color:var(--muted)}
    .key.wide{grid-column:1/-1}

    /* status */
    .status{
      min-height:20px;text-align:center;font-size:11px;font-weight:600;
      letter-spacing:.06em;margin-top:18px;transition:all .2s;
    }
    .status.err{color:var(--danger)}
    .status.ok{color:var(--green)}
    .status.info{color:var(--muted)}

    /* loading overlay */
    .overlay{
      display:none;position:absolute;inset:0;border-radius:20px;
      background:rgba(2,4,10,.92);backdrop-filter:blur(6px);
      flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:10;
    }
    .overlay.show{display:flex}
    .spinner{
      width:36px;height:36px;border-radius:50%;
      border:2px solid rgba(88,166,255,.2);
      border-top-color:var(--accent);
      animation:spin .75s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .overlay-txt{font-size:13px;font-weight:600;color:rgba(255,255,255,.7)}

    /* user badge */
    .user-badge{
      display:flex;align-items:center;justify-content:center;gap:8px;
      padding:7px 14px;border-radius:999px;margin:0 auto 20px;
      width:fit-content;
      background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.2);
      font-size:11px;font-weight:700;color:var(--green);letter-spacing:.04em;
    }
    .user-badge .dot-live{width:6px;height:6px;border-radius:50%;background:var(--green);
      box-shadow:0 0 8px var(--green);animation:blink 2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="card" id="pinCard">
    <!-- Loading overlay -->
    <div class="overlay" id="overlay">
      <div class="spinner"></div>
      <div class="overlay-txt" id="overlayTxt">Verifying PIN…</div>
    </div>

    <div class="shield">🔒</div>

    <!-- User badge — filled by JS -->
    <div class="user-badge" id="userBadge" style="display:none">
      <span class="dot-live"></span>
      <span id="userLabel">Authenticated</span>
    </div>

    <div class="title">Security PIN</div>
    <div class="subtitle">Enter your 4-digit PIN to continue</div>

    <!-- PIN dot indicators -->
    <div class="pin-dots" id="pinDots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>

    <!-- Numpad -->
    <div class="numpad" id="numpad">
      <button class="key" data-n="1">1</button>
      <button class="key" data-n="2">2</button>
      <button class="key" data-n="3">3</button>
      <button class="key" data-n="4">4</button>
      <button class="key" data-n="5">5</button>
      <button class="key" data-n="6">6</button>
      <button class="key" data-n="7">7</button>
      <button class="key" data-n="8">8</button>
      <button class="key" data-n="9">9</button>
      <button class="key del" id="btnDel"><i class="fas fa-delete-left"></i></button>
      <button class="key" data-n="0">0</button>
      <button class="key del" id="btnClear" title="Clear"><i class="fas fa-rotate-left"></i></button>
    </div>

    <div class="status info" id="status">Enter 4-digit PIN</div>
  </div>

  <!-- Use existing MUMS scripts (cloud_auth.js for session, auth.js for pin) -->
  <script src="./js/env_runtime.js?v=p1-516"></script>
  <script src="./js/remote_patch.js?v=p1-516"></script>
  <script src="./js/config/version.js?v=p1-516"></script>
  <script src="./js/config.js?v=p1-516"></script>
  <script src="./js/store.js?v=p1-516"></script>
  <script src="./js/cloud_auth.js?v=p1-516"></script>
  <script src="./js/cloud_users.js?v=p1-516"></script>
  <script src="./js/auth.js?v=p1-516"></script>

  <script>
  // ════════════════════════════════════════════════════════════════════
  // PRISM LOADER — PIN GATE
  // STRICT GUARD: Must have an active auth session to see this page.
  // If no session → kick back to login. DO NOT modify cloud_auth.js.
  // ════════════════════════════════════════════════════════════════════

  (function pinSessionGuard() {
    // Inline session check using CloudAuth (already loaded above)
    // We poll because cloud_auth.js initialises asynchronously
    let attempts = 0;
    function check() {
      attempts++;
      if (!window.CloudAuth) {
        if (attempts < 30) return setTimeout(check, 100); // wait up to 3s
        return window.location.replace('./login.html');
      }
      const session = CloudAuth.loadSession && CloudAuth.loadSession();
      if (!session || !session.access_token) {
        // No active session — boot back to login
        try { sessionStorage.clear(); } catch(_) {}
        return window.location.replace('./login.html');
      }
      // Session OK — show user badge
      try {
        const u = CloudAuth.getUser && CloudAuth.getUser();
        if (u) {
          const label = u.user_metadata && (u.user_metadata.full_name || u.user_metadata.name)
            || u.email || 'Authenticated User';
          const badge = document.getElementById('userBadge');
          const labelEl = document.getElementById('userLabel');
          if (badge && labelEl) { labelEl.textContent = label; badge.style.display = 'flex'; }
        }
      } catch(_) {}
    }
    // DOM is already parsed (scripts are at end of body) — start immediately
    check();
  })();

  // ════════════════════════════════════════════════════════════════════
  // PIN INPUT LOGIC — DO NOT modify verifyPin algorithm
  // ════════════════════════════════════════════════════════════════════
  (function() {
    let pin = '';
    const MAX = 4;

    const dots    = [0,1,2,3].map(i => document.getElementById('d'+i));
    const status  = document.getElementById('status');
    const overlay = document.getElementById('overlay');
    const overlayTxt = document.getElementById('overlayTxt');
    const numpad  = document.getElementById('numpad');

    function setStatus(msg, cls) {
      status.textContent = msg;
      status.className = 'status ' + (cls || 'info');
    }

    function renderDots(errState) {
      dots.forEach((d, i) => {
        d.className = 'dot';
        if (errState) { d.classList.add('error'); return; }
        if (i < pin.length) d.classList.add('filled');
      });
    }

    function addDigit(d) {
      if (pin.length >= MAX) return;
      pin += d;
      renderDots();
      setStatus('', 'info');
      if (pin.length === MAX) setTimeout(submitPin, 80);
    }

    function delDigit() {
      if (!pin.length) return;
      pin = pin.slice(0, -1);
      renderDots();
    }

    function clearPin() {
      pin = '';
      renderDots();
      setStatus('Enter 4-digit PIN', 'info');
    }

    async function submitPin() {
      numpad.style.pointerEvents = 'none';
      overlay.classList.add('show');
      if (overlayTxt) overlayTxt.textContent = 'Verifying PIN…';
      setStatus('Verifying…', 'info');

      try {
        // ★ Uses existing /api/pin/verify endpoint — DO NOT change PIN logic
        const tok = (window.CloudAuth && CloudAuth.accessToken) ? CloudAuth.accessToken() : '';
        const resp = await fetch('/api/pin/verify', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(tok ? { 'Authorization': 'Bearer ' + tok } : {})
          },
          body: JSON.stringify({ pin })
        });
        const data = await resp.json().catch(() => ({}));

        if (resp.ok && data.ok) {
          // ★ PRISM LOADER: Set session flags then redirect to loader
          setStatus('✓ PIN Verified', 'ok');
          if (overlayTxt) overlayTxt.textContent = 'Launching…';
          try {
            sessionStorage.setItem('mums_pin_ok', '1');
            sessionStorage.setItem('mums_pin_ts', Date.now().toString());
          } catch(_) {}
          // Short visual delay so user sees success state, then go to loader
          setTimeout(() => { window.location.replace('./loader-prism.html'); }, 350);
          return;
        }

        // PIN wrong or server error
        const msg = (data && data.message) ? data.message : 'Incorrect PIN. Please try again.';
        setStatus('✕ ' + msg, 'err');
        renderDots(true);
        overlay.classList.remove('show');
        numpad.style.pointerEvents = '';
        setTimeout(() => {
          pin = '';
          renderDots();
          setStatus('Enter 4-digit PIN', 'info');
        }, 1100);

      } catch(err) {
        setStatus('Network error. Try again.', 'err');
        overlay.classList.remove('show');
        numpad.style.pointerEvents = '';
        pin = '';
        renderDots();
      }
    }

    // Keyboard input
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') addDigit(e.key);
      else if (e.key === 'Backspace') delDigit();
      else if (e.key === 'Escape') clearPin();
    });

    // Numpad buttons
    document.getElementById('numpad').addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      if (btn.dataset.n !== undefined) addDigit(btn.dataset.n);
      else if (btn.id === 'btnDel') delDigit();
      else if (btn.id === 'btnClear') clearPin();
    });
  })();
  </script>
</body>
</html>
