<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Search Engine 2 — MUMS Support Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="/css/search_engine_2_enterprise.css" rel="stylesheet"/>
  <style>
    :root{--bg:#070d1a;--surface:#0d1630;--surface2:#101b3a;--border:rgba(116,151,212,.18);--border2:rgba(116,151,212,.28);--text:#c8d8f0;--white:#e8f4ff;--muted:#4a6080;--muted2:#7a94b8;--accent:#39a0ff;--green:#10b981;--amber:#f59e0b;--rose:#f43f5e;}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
    .se2-header{padding:16px 24px 0;flex-shrink:0;position:relative}
    .search-wrap{background:var(--surface);border:1.5px solid var(--border2);border-radius:16px;display:flex;align-items:center;gap:12px;padding:13px 18px;transition:border-color .2s,box-shadow .2s;box-shadow:0 4px 24px rgba(0,0,0,.35);position:relative}
    .search-wrap:focus-within{border-color:rgba(57,160,255,.5);box-shadow:0 4px 32px rgba(57,160,255,.14)}
    .search-icon{opacity:.5;flex-shrink:0;font-size:18px;color:var(--muted2)}
    .search-input{flex:1;background:transparent;border:none;outline:none;color:var(--white);font-size:17px;font-family:inherit;font-weight:500}
    .search-input::placeholder{color:var(--muted)}
    .search-kbd{font-size:11px;font-weight:700;color:var(--muted);background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;padding:3px 8px;flex-shrink:0;font-family:monospace;letter-spacing:.04em;white-space:nowrap}
    .search-clear{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:var(--muted2);font-size:13px;cursor:pointer;padding:4px 9px;display:none;transition:all .15s;font-family:inherit}
    .search-clear:hover{background:rgba(248,81,73,.12);border-color:rgba(248,81,73,.3);color:#f85149}
    .search-status{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;display:none}
    .autocomplete-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border2);border-top:none;border-radius:0 0 14px 14px;box-shadow:0 14px 48px rgba(0,0,0,.55);z-index:200;max-height:280px;overflow-y:auto;display:none}
    .autocomplete-dropdown.open{display:block}
    .autocomplete-item{padding:9px 18px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s;border-bottom:1px solid rgba(255,255,255,.03)}
    .autocomplete-item:hover,.autocomplete-item.ac-active{background:rgba(57,160,255,.08)}
    .autocomplete-icon{font-size:12px;color:var(--muted);width:14px;flex-shrink:0}
    .autocomplete-term{color:var(--white);font-weight:500;font-size:13px}
    .autocomplete-term mark{background:rgba(57,160,255,.3);color:#fff;border-radius:2px;padding:0 1px}
    .autocomplete-meta{color:var(--muted);font-size:10px;margin-left:auto}
    .autocomplete-section{padding:5px 18px 3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.04)}
    .cats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:12px 24px 0;flex-shrink:0}
    .cat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 8px;text-align:center;cursor:pointer;transition:all .18s}
    .cat-card:hover{transform:translateY(-2px);border-color:var(--border2)}
    .cat-card.active{transform:none}
    .cat-icon{font-size:20px;margin-bottom:5px;display:block;line-height:1}
    .cat-num{font-size:22px;font-weight:900;line-height:1;margin-bottom:3px}
    .cat-lbl{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.03em}
    .cat-card.active.cat-blue{border-color:rgba(88,166,255,.5);box-shadow:0 0 0 2px rgba(88,166,255,.12)}
    .cat-card.active.cat-green{border-color:rgba(16,185,129,.5);box-shadow:0 0 0 2px rgba(16,185,129,.12)}
    .cat-card.active.cat-amber{border-color:rgba(245,158,11,.5);box-shadow:0 0 0 2px rgba(245,158,11,.12)}
    .cat-card.active.cat-violet{border-color:rgba(167,139,250,.5);box-shadow:0 0 0 2px rgba(167,139,250,.12)}
    .cat-card.active.cat-cyan{border-color:rgba(34,211,238,.5);box-shadow:0 0 0 2px rgba(34,211,238,.12)}
    .cat-card.active.cat-rose{border-color:rgba(244,63,94,.5);box-shadow:0 0 0 2px rgba(244,63,94,.12)}
    .c-blue{color:#58a6ff}.c-green{color:#10b981}.c-amber{color:#f59e0b}.c-violet{color:#a78bfa}.c-cyan{color:#22d3ee}.c-rose{color:#f43f5e}
    .total-row{padding:6px 24px 0;flex-shrink:0;font-size:11px;color:var(--muted);text-align:center}
    .total-row strong{color:var(--accent)}
    .ai-panel{background:linear-gradient(135deg,rgba(57,160,255,.055),rgba(16,185,129,.035));border:1px solid rgba(57,160,255,.22);border-radius:14px;margin:10px 24px 0;overflow:hidden;animation:fadeSlideIn .28s ease-out;flex-shrink:0;display:none}
    .ai-panel.visible{display:block}
    .ai-panel-header{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(57,160,255,.1);background:rgba(57,160,255,.035)}
    .ai-avatar{font-size:18px;background:rgba(57,160,255,.15);border-radius:9px;padding:5px 7px;line-height:1;flex-shrink:0}
    .ai-label{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.04em;flex:1}
    .ai-copy-btn,.ai-close-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:7px;color:var(--muted2);font-size:11px;cursor:pointer;padding:3px 8px;transition:all .15s;font-family:inherit}
    .ai-copy-btn:hover{background:rgba(57,160,255,.12);color:var(--accent)}
    .ai-close-btn:hover{background:rgba(248,81,73,.1);color:#f85149;border-color:rgba(248,81,73,.3)}
    .ai-panel-body{padding:13px 18px;font-size:12.5px;line-height:1.7;color:var(--white);max-height:240px;overflow-y:auto}
    .ai-panel-body::-webkit-scrollbar{width:3px}
    .ai-panel-body::-webkit-scrollbar-thumb{background:rgba(57,160,255,.25);border-radius:99px}
    .ai-panel-body h4{color:var(--accent);margin:11px 0 5px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
    .ai-panel-body h4:first-child{margin-top:0}
    .ai-panel-body ul{padding-left:18px;margin:4px 0}
    .ai-panel-body li{margin:3px 0;color:var(--text)}
    .ai-panel-body p{margin:5px 0;color:var(--text)}
    .ai-panel-body em{color:var(--accent);font-style:normal;font-weight:600}
    .ai-panel-body strong{color:var(--white)}
    .ai-panel-body code{background:rgba(255,255,255,.07);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:11px;color:#22d3ee}
    .ai-panel-body kbd{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:11px}
    .ai-highlight{color:var(--green);font-weight:700}
    .ai-case-link{color:var(--accent);cursor:pointer;font-family:monospace;font-size:11px;text-decoration:underline;text-underline-offset:2px}
    .ai-case-link:hover{color:#fff}
    .ai-details-grid{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;padding:8px 10px;background:rgba(255,255,255,.025);border-radius:8px;border:1px solid rgba(255,255,255,.06)}
    .ai-detail-item{font-size:11px;color:var(--muted2);line-height:1.5;flex-basis:48%}
    .ai-tip{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);border-radius:7px;padding:6px 10px;margin-top:8px;font-size:11.5px;color:var(--text)}
    .ai-did-you-mean{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
    .ai-suggest-term{padding:4px 11px;border-radius:99px;background:rgba(57,160,255,.1);border:1px solid rgba(57,160,255,.25);font-size:11px;color:var(--accent);cursor:pointer;transition:all .15s}
    .ai-suggest-term:hover{background:rgba(57,160,255,.2);border-color:rgba(57,160,255,.5)}
    .ai-panel-footer{padding:7px 16px;font-size:10px;color:var(--muted);border-top:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:space-between}
    .ai-cursor{display:inline-block;width:2px;height:13px;background:var(--accent);animation:blink .8s infinite;vertical-align:middle;margin-left:2px}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .filter-bar{display:none;align-items:center;gap:8px;padding:8px 24px 0;flex-shrink:0;flex-wrap:wrap}
    .filter-bar.visible{display:flex}
    .filter-bar select,.filter-bar input{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:11px;font-family:inherit;padding:5px 10px;outline:none;transition:border-color .15s}
    .filter-bar select:focus,.filter-bar input:focus{border-color:rgba(57,160,255,.4)}
    .filter-bar input::placeholder{color:var(--muted)}
    .filter-results-count{font-size:11px;color:var(--muted);margin-left:auto}
    .history-section{padding:8px 24px 0;flex-shrink:0;display:none}
    .history-section.visible{display:block}
    .history-label{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
    .history-clear-btn{font-size:9px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:inherit;padding:0;transition:color .15s}
    .history-clear-btn:hover{color:var(--rose)}
    .history-chips{display:flex;flex-wrap:wrap;gap:5px}
    .history-chip{padding:4px 10px;border-radius:99px;background:var(--surface);border:1px solid var(--border);font-size:10px;color:var(--muted2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
    .history-chip:hover{border-color:rgba(57,160,255,.4);color:var(--accent)}
    .se2-body{flex:1;overflow-y:auto;padding:10px 24px 24px;min-height:0}
    .se2-body::-webkit-scrollbar{width:4px}
    .se2-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:99px}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:240px;gap:12px;text-align:center;padding:20px}
    .empty-icon{width:72px;height:72px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);display:grid;place-items:center;font-size:30px;margin-bottom:4px}
    .empty-title{font-size:19px;font-weight:800;color:var(--white)}
    .empty-sub{font-size:12px;color:var(--muted);max-width:460px;line-height:1.65}
    .chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:6px}
    .chip{padding:5px 13px;border-radius:99px;background:var(--surface);border:1px solid var(--border);font-size:11px;color:var(--muted2);cursor:pointer;transition:all .15s}
    .chip:hover{border-color:rgba(57,160,255,.4);color:var(--accent);background:rgba(57,160,255,.06)}
    .results-header{display:flex;align-items:center;justify-content:space-between;padding:4px 0 10px;border-bottom:1px solid var(--border);margin-bottom:10px}
    .results-count{font-size:11px;color:var(--muted)}
    .results-count strong{color:var(--white)}
    .group-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;display:flex;align-items:center;gap:7px;margin:14px 0 7px;color:var(--muted2)}
    .group-label::after{content:'';flex:1;height:1px;background:var(--border)}
    .result-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 15px;margin-bottom:7px;cursor:pointer;transition:all .15s;position:relative}
    .result-card:hover{border-color:rgba(57,160,255,.35);background:rgba(57,160,255,.03);transform:translateX(2px)}
    .result-card.expanded{border-color:rgba(57,160,255,.3);background:rgba(57,160,255,.025)}
    .result-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:6px}
    .result-cat-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.04em;text-transform:uppercase}
    .result-case{font-size:10px;font-weight:700;color:var(--accent);font-family:monospace;background:rgba(57,160,255,.1);border:1px solid rgba(57,160,255,.2);padding:2px 7px;border-radius:5px;cursor:pointer}
    .result-case:hover{background:rgba(57,160,255,.2)}
    .result-eu{font-size:10px;color:var(--muted2)}
    .relevance-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;font-family:monospace;margin-left:auto;flex-shrink:0}
    .rel-high{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.2)}
    .rel-med{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
    .rel-low{background:rgba(244,63,94,.08);color:#f43f5e;border:1px solid rgba(244,63,94,.15)}
    .result-title{font-size:13px;font-weight:700;color:var(--white);margin-bottom:4px;line-height:1.4}
    .result-snippet{font-size:11.5px;color:var(--muted2);line-height:1.55;margin-bottom:0}
    mark{background:rgba(57,160,255,.25);color:#fff;border-radius:2px;padding:0 1px}
    .result-expand-row{display:flex;align-items:center;gap:8px;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.04)}
    .result-expand-btn{font-size:10px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:inherit;padding:0;font-weight:700;transition:opacity .15s}
    .result-expand-btn:hover{opacity:.75}
    .result-copy-btn{font-size:9px;color:var(--muted2);cursor:pointer;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-family:inherit;transition:all .15s;margin-left:auto}
    .result-copy-btn:hover{color:var(--accent);border-color:rgba(57,160,255,.35)}
    .result-full-res{display:none;padding:10px 0 0;font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word}
    .result-full-res.open{display:block}
    .no-results{padding:40px 10px;text-align:center;color:var(--muted)}
    .no-results-icon{font-size:34px;opacity:.25;display:block;margin-bottom:12px}
    .no-results-title{font-size:15px;font-weight:700;color:var(--muted2);margin-bottom:5px}
    .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:14px;color:var(--muted);font-size:12px}
    .spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.07);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    .skeleton-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:7px;animation:pulse 1.4s ease-in-out infinite}
    .skeleton-line{background:rgba(255,255,255,.05);border-radius:4px;height:10px;margin-bottom:8px}
    .skeleton-line.wide{width:75%}.skeleton-line.narrow{width:40%}.skeleton-line.full{width:90%}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body class="se2-enterprise">

<div class="se2-header se-header">
  <div class="se-header-top">
    <div class="se-logo">&#128269;</div>
    <div class="se-app-name">Search Engine 2.0</div>
  </div>
  <div class="search-wrap se-search-wrapper" id="search-wrap">
    <span class="search-icon">&#128270;</span>
    <input id="q" class="search-input" type="text"
      placeholder="Search support records, cases, parts, knowledge base&#x2026;"
      autocomplete="off" spellcheck="false"/>
    <span class="search-status" id="search-status">Loading&#x2026;</span>
    <button class="search-clear" id="clear-btn" onclick="clearSearch()">&#x2715;</button>
    <span class="search-kbd">&#8984; K</span>
    <div class="autocomplete-dropdown" id="autocomplete"></div>
  </div>
</div>

<div class="cats-row se-cats">
  <div class="cat-card cat-blue se-cat se-cat-blue" data-g="qb" onclick="filterGroup('qb')">
    <span class="cat-icon se-cat-icon">&#128279;</span><div class="cat-num c-blue se-cat-count" id="cnt-qb">&#8212;</div><div class="cat-lbl se-cat-label">QuickBase Cases</div>
  </div>
  <div class="cat-card cat-green se-cat se-cat-green" data-g="kb" onclick="filterGroup('kb')">
    <span class="cat-icon se-cat-icon">&#128218;</span><div class="cat-num c-green se-cat-count" id="cnt-kb">&#8212;</div><div class="cat-lbl se-cat-label">Knowledge Base</div>
  </div>
  <div class="cat-card cat-amber se-cat se-cat-amber" data-g="parts" onclick="filterGroup('parts')">
    <span class="cat-icon se-cat-icon">&#128297;</span><div class="cat-num c-amber se-cat-count" id="cnt-parts">&#8212;</div><div class="cat-lbl se-cat-label">Parts</div>
  </div>
  <div class="cat-card cat-violet se-cat se-cat-violet" data-g="ctrl" onclick="filterGroup('ctrl')">
    <span class="cat-icon se-cat-icon">&#128187;</span><div class="cat-num c-violet se-cat-count" id="cnt-ctrl">&#8212;</div><div class="cat-lbl se-cat-label">Controllers</div>
  </div>
  <div class="cat-card cat-cyan se-cat se-cat-cyan" data-g="net" onclick="filterGroup('net')">
    <span class="cat-icon se-cat-icon">&#128225;</span><div class="cat-num c-cyan se-cat-count" id="cnt-net">&#8212;</div><div class="cat-lbl se-cat-label">Connect+ / Net</div>
  </div>
  <div class="cat-card cat-rose se-cat se-cat-rose" data-g="other" onclick="filterGroup('other')">
    <span class="cat-icon se-cat-icon">&#128203;</span><div class="cat-num c-rose se-cat-count" id="cnt-other">&#8212;</div><div class="cat-lbl se-cat-label">Support Records</div>
  </div>
</div>

<div class="total-row se-toolbar-row" id="total-row">Loading&#x2026;</div>

<div class="ai-panel" id="ai-panel">
  <div class="ai-panel-header">
    <span class="ai-avatar">&#129302;</span>
    <span class="ai-label">MUMS AI Assistant</span>
    <button class="ai-copy-btn" id="ai-copy-btn" onclick="copyAIResponse()" title="Copy response">&#128203; Copy</button>
    <button class="ai-close-btn" onclick="closeAIPanel()">&#x2715;</button>
  </div>
  <div class="ai-panel-body" id="ai-body"></div>
  <div class="ai-panel-footer">
    <span id="ai-sources">Analyzing&#x2026;</span>
    <span style="font-size:9px;color:var(--muted);opacity:.6;">Client-side &#xB7; No external API</span>
  </div>
</div>

<div class="filter-bar" id="filter-bar">
  <select id="sort-by" onchange="applyFilters()">
    <option value="relevance">Sort: Relevance</option>
    <option value="newest">Sort: Case # &#x2191;</option>
    <option value="oldest">Sort: Case # &#x2193;</option>
  </select>
  <input type="text" id="filter-eu" placeholder="Filter by End User&#x2026;" oninput="applyFilters()"/>
  <span class="filter-results-count" id="filter-count"></span>
</div>

<div class="history-section" id="history-section">
  <div class="history-label">
    Recent Searches
    <button class="history-clear-btn" onclick="clearHistory()">Clear all</button>
  </div>
  <div class="history-chips" id="history-chips"></div>
</div>

<div class="se2-body se-main" id="body">
  <div class="loading-state"><div class="spinner"></div><span>Loading indexed records&#x2026;</span></div>
</div>

<script src="/js/search_engine_v2.js"></script>
<script src="/js/search_ai_responder.js"></script>
<script>
(function(){
  'use strict';
  var GROUPS={qb:{ids:['e2e3_gateway','alarms','floorplan_screens','firmware','refrigeration','password_credentials','data_reports','temperature_haccp'],label:'QuickBase Cases',color:'#58a6ff'},kb:{ids:[],catRx:/knowledge|guide|manual|instruction|education|training/i,label:'Knowledge Base',color:'#10b981'},parts:{ids:['parts_xr_controllers','parts_xm_controllers','parts_cc200','parts_license_keys','parts_rga_warranty','parts_probes_sensors','parts_sporlan_danfoss','parts_site_supervisor','parts_walmart_jobs','parts_part_number_inquiry','parts_products'],label:'Parts',color:'#f59e0b'},ctrl:{ids:['controller_hardware','site_supervisor','programming'],label:'Controllers',color:'#a78bfa'},net:{ids:['connect_plus'],label:'Connect+ / Net',color:'#22d3ee'},other:{ids:[],label:'Support Records',color:'#f43f5e'}};
  var CHIPS=['E3 offline','Walmart','license key','E2 firmware','Modbus','floor plan','HACCP','XR75','solenoid','probe failure','RGA defective','xweb password'];
  var ID2G={};
  ['qb','kb','parts','ctrl','net'].forEach(function(g){(GROUPS[g].ids||[]).forEach(function(id){ID2G[id]=g;});});
  function getGroup(r){var id=String(r.id||'');if(ID2G[id])return ID2G[id];if(GROUPS.kb.catRx&&GROUPS.kb.catRx.test(r.cat||''))return 'kb';return 'other';}
  var state={all:[],query:'',activeGroup:null,loaded:false,lastResults:[],lastOutput:null,sortBy:'relevance',filterEu:'',acIndex:-1,acItems:[],acVisible:false,expandedCards:{}};

  function hl(text,tokens){
    var s=String(text||'');
    if(!tokens||!tokens.length)return esc(s);

    tokens.forEach(function(t){
      if(!t||t.length<2)return;
      try{result=result.replace(new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>');}catch(e){}
    });

  }
  function snippet(text,tokens,maxLen){

    if(tokens&&tokens.length){tokens.forEach(function(t){var idx=lower.indexOf(t);if(idx>=0)bestPos=Math.max(0,idx-50);});}
    var chunk=s.slice(bestPos,bestPos+maxLen);
