<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Search Engine 2 — MUMS Support Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    /* ── BASE ── */
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Inter',system-ui,sans-serif;background:#08101e;color:#e2e8f0;display:flex;flex-direction:column}

    /* ── HEADER ── */
    .se2-header{
      position:sticky;top:0;z-index:50;
      background:rgba(8,16,30,.96);
      -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,.06);
      padding:14px 20px 0;
      flex-shrink:0;
    }
    /* Brand row */
    .se2-brand-row{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:12px;
    }
    .se2-brand{display:flex;align-items:center;gap:10px}
    .se2-logo{
      width:32px;height:32px;border-radius:9px;
      background:linear-gradient(135deg,#2563eb 0%,#7c3aed 100%);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .se2-logo svg{width:15px;height:15px;color:#fff}
    .se2-title{font-size:15px;font-weight:800;color:#f1f5f9;letter-spacing:-.02em}
    .se2-title span{
      background:linear-gradient(135deg,#3b82f6,#818cf8);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .se2-brand-meta{display:flex;align-items:center;gap:10px}
    .se2-indexed-pill{
      background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);
      border-radius:99px;padding:4px 12px;
      font-size:11px;font-weight:700;color:#60a5fa;letter-spacing:.02em;
    }
    .se2-live{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b}
    .se2-live-dot{
      width:7px;height:7px;border-radius:50%;background:#10b981;
      box-shadow:0 0 0 2px rgba(16,185,129,.2);
      animation:livepulse 2s ease-in-out infinite;
    }
    @keyframes livepulse{0%,100%{box-shadow:0 0 0 2px rgba(16,185,129,.2)}50%{box-shadow:0 0 0 4px rgba(16,185,129,.08)}}

    /* ── SEARCH BAR ── */
    .search-wrap{
      display:flex;align-items:center;gap:10px;
      background:#111827;
      border:1.5px solid rgba(255,255,255,.08);
      border-radius:14px;padding:11px 16px;
      transition:border-color .25s,box-shadow .25s;
      position:relative;
    }
    .search-wrap:focus-within{
      border-color:rgba(59,130,246,.55);
      box-shadow:0 0 0 4px rgba(59,130,246,.08),0 4px 24px rgba(0,0,0,.4);
    }
    .search-icon{flex-shrink:0;color:#475569}
    .search-icon svg{width:17px;height:17px;display:block}
    .search-input{
      flex:1;background:none;border:none;outline:none;
      color:#f1f5f9;font-size:15px;font-family:inherit;font-weight:500;
    }
    .search-input::placeholder{color:#334155}
    .search-status{font-size:11px;color:#475569;white-space:nowrap;flex-shrink:0;display:none}
    .search-clear{
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
      border-radius:7px;color:#64748b;font-size:13px;cursor:pointer;
      padding:4px 9px;display:none;transition:all .15s;font-family:inherit;
    }
    .search-clear:hover{background:rgba(248,81,73,.12);border-color:rgba(248,81,73,.3);color:#f85149}
    .search-kbd-group{display:flex;align-items:center;gap:4px;flex-shrink:0}
    .search-kbd{
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
      border-radius:5px;padding:2px 7px;
      font-size:10px;font-weight:700;color:#475569;font-family:monospace;letter-spacing:.02em;
      white-space:nowrap;
    }
    /* Autocomplete */
    .autocomplete-dropdown{
      position:absolute;top:calc(100% + 4px);left:0;right:0;
      background:#111827;border:1px solid rgba(255,255,255,.1);
      border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.6);
      z-index:200;max-height:280px;overflow-y:auto;display:none;
    }
    .autocomplete-dropdown.open{display:block}
    .autocomplete-item{
      padding:9px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;
      transition:background .1s;border-bottom:1px solid rgba(255,255,255,.04);
    }
    .autocomplete-item:last-child{border-bottom:none}
    .autocomplete-item:hover,.autocomplete-item.ac-active{background:rgba(59,130,246,.08)}
    .autocomplete-icon{font-size:12px;color:#475569;width:14px;flex-shrink:0}
    .autocomplete-term{color:#f1f5f9;font-weight:500;font-size:13px}
    .autocomplete-term mark{background:rgba(250,204,21,.3);color:#fde047;border-radius:2px;padding:0 1px}
    .autocomplete-meta{color:#475569;font-size:10px;margin-left:auto}
    .autocomplete-section{
      padding:6px 16px 4px;font-size:9px;font-weight:700;text-transform:uppercase;
      letter-spacing:.1em;color:#475569;border-bottom:1px solid rgba(255,255,255,.04);
    }

    /* ── CATEGORY CARDS ── */
    .cats-row{
      display:grid;grid-template-columns:repeat(6,1fr);
      gap:8px;padding:12px 20px;flex-shrink:0;
    }
    .cat-card{
      background:rgba(255,255,255,.025);
      border:1px solid rgba(255,255,255,.06);
      border-radius:12px;padding:12px 8px;
      text-align:center;cursor:pointer;
      transition:all .2s;position:relative;overflow:hidden;
    }
    .cat-card::after{
      content:'';position:absolute;bottom:0;left:16px;right:16px;
      height:2px;border-radius:2px;background:var(--cat-accent,#3b82f6);
      opacity:0;transition:opacity .2s;
    }
    .cat-card:hover{
      background:rgba(255,255,255,.04);
      border-color:rgba(255,255,255,.1);
      transform:translateY(-2px);
    }
    .cat-card.active{
      background:rgba(255,255,255,.05);
      border-color:rgba(255,255,255,.14);
      transform:translateY(0);
      box-shadow:0 0 24px var(--cat-glow,rgba(59,130,246,.08));
    }
    .cat-card.active::after{opacity:1}
    /* Active label color */
    .cat-card.active .cat-lbl{color:#94a3b8}
    .cat-card.active .cat-num{opacity:1}

    .cat-icon-wrap{
      width:34px;height:34px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 8px;background:var(--cat-bg,rgba(59,130,246,.12));
    }
    .cat-icon-wrap svg{width:16px;height:16px;display:block}
    .cat-num{
      font-size:20px;font-weight:900;line-height:1;margin-bottom:3px;
      opacity:.7;transition:opacity .2s;
    }
    .cat-lbl{font-size:9px;font-weight:700;color:#475569;letter-spacing:.04em;line-height:1.3}

    /* Per-source accent — blue */
    .cat-card.cat-blue  {--cat-accent:#3b82f6;--cat-bg:rgba(59,130,246,.12);--cat-glow:rgba(59,130,246,.08)}
    .cat-card.cat-green {--cat-accent:#10b981;--cat-bg:rgba(16,185,129,.12);--cat-glow:rgba(16,185,129,.08)}
    .cat-card.cat-amber {--cat-accent:#f59e0b;--cat-bg:rgba(245,158,11,.12);--cat-glow:rgba(245,158,11,.08)}
    .cat-card.cat-violet{--cat-accent:#a855f7;--cat-bg:rgba(168,85,247,.12);--cat-glow:rgba(168,85,247,.08)}
    .cat-card.cat-cyan  {--cat-accent:#06b6d4;--cat-bg:rgba(6,182,212,.12);--cat-glow:rgba(6,182,212,.08)}
    .cat-card.cat-rose  {--cat-accent:#f43f5e;--cat-bg:rgba(244,63,94,.12);--cat-glow:rgba(244,63,94,.08)}

    .c-blue  {color:#58a6ff}.c-green{color:#10b981}.c-amber{color:#f59e0b}
    .c-violet{color:#a78bfa}.c-cyan {color:#22d3ee}.c-rose {color:#f43f5e}

    .cat-card.active.cat-blue  {border-color:rgba(59,130,246,.35)}
    .cat-card.active.cat-green {border-color:rgba(16,185,129,.35)}
    .cat-card.active.cat-amber {border-color:rgba(245,158,11,.35)}
    .cat-card.active.cat-violet{border-color:rgba(168,85,247,.35)}
    .cat-card.active.cat-cyan  {border-color:rgba(6,182,212,.35)}
    .cat-card.active.cat-rose  {border-color:rgba(244,63,94,.35)}

    /* ── STATS / TOOLBAR BAR ── */
    .se2-stats-bar{
      display:flex;align-items:center;justify-content:space-between;
      padding:6px 20px 8px;flex-shrink:0;
      border-top:1px solid rgba(255,255,255,.04);
    }
    .total-row{font-size:11px;color:#475569;padding:0}
    .total-row strong{color:#60a5fa}
    .se2-toolbar-right{display:flex;align-items:center;gap:6px}
    .se2-view-btn{
      display:flex;align-items:center;gap:5px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
      border-radius:7px;padding:4px 9px;
      font-size:10px;font-weight:600;color:#64748b;
      cursor:pointer;font-family:inherit;transition:all .15s;
    }
    .se2-view-btn svg{width:11px;height:11px}
    .se2-view-btn:hover{border-color:rgba(255,255,255,.14);color:#94a3b8}
    .se2-view-btn.active{
      border-color:rgba(59,130,246,.4);color:#60a5fa;
      background:rgba(59,130,246,.08);
    }
    .se2-vdivider{width:1px;height:18px;background:rgba(255,255,255,.08);margin:0 2px}
    .se2-sort-btn{
      display:flex;align-items:center;gap:5px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
      border-radius:7px;padding:4px 9px;
      font-size:10px;font-weight:600;color:#64748b;
      cursor:pointer;font-family:inherit;transition:all .15s;
    }
    .se2-sort-btn svg{width:11px;height:11px}
    .se2-sort-btn:hover{border-color:rgba(255,255,255,.14);color:#94a3b8}

    /* ── AI PANEL ── */
    .ai-panel{
      background:linear-gradient(135deg,rgba(59,130,246,.05),rgba(16,185,129,.03));
      border:1px solid rgba(59,130,246,.2);border-radius:12px;
      margin:0 20px 8px;overflow:hidden;
      animation:fadeSlideIn .25s ease-out;flex-shrink:0;display:none;
    }
    .ai-panel.visible{display:block}
    .ai-panel-header{
      display:flex;align-items:center;gap:10px;padding:9px 14px;
      border-bottom:1px solid rgba(59,130,246,.1);
      background:rgba(59,130,246,.04);
    }
    .ai-avatar{
      font-size:16px;background:rgba(59,130,246,.15);
      border-radius:8px;padding:4px 6px;line-height:1;flex-shrink:0;
    }
    .ai-label{font-size:12px;font-weight:700;color:#60a5fa;letter-spacing:.04em;flex:1}
    .ai-copy-btn,.ai-close-btn{
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
      border-radius:6px;color:#64748b;font-size:11px;cursor:pointer;
      padding:3px 8px;transition:all .15s;font-family:inherit;
    }
    .ai-copy-btn:hover{background:rgba(59,130,246,.12);color:#60a5fa}
    .ai-close-btn:hover{background:rgba(248,81,73,.1);color:#f85149;border-color:rgba(248,81,73,.3)}
    .ai-panel-body{
      padding:12px 16px;font-size:12.5px;line-height:1.7;
      color:#e2e8f0;max-height:220px;overflow-y:auto;
    }
    .ai-panel-body::-webkit-scrollbar{width:3px}
    .ai-panel-body::-webkit-scrollbar-thumb{background:rgba(59,130,246,.25);border-radius:99px}
    .ai-panel-body h4{color:#60a5fa;margin:10px 0 4px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
    .ai-panel-body h4:first-child{margin-top:0}
    .ai-panel-body ul{padding-left:18px;margin:4px 0}
    .ai-panel-body li{margin:3px 0;color:#cbd5e1}
    .ai-panel-body p{margin:4px 0;color:#cbd5e1}
    .ai-panel-body em{color:#60a5fa;font-style:normal;font-weight:600}
    .ai-panel-body strong{color:#f1f5f9}
    .ai-panel-body code{background:rgba(255,255,255,.07);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:11px;color:#22d3ee}
    .ai-panel-body kbd{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:11px}
    .ai-highlight{color:#10b981;font-weight:700}
    .ai-case-link{color:#60a5fa;cursor:pointer;font-family:monospace;font-size:11px;text-decoration:underline;text-underline-offset:2px}
    .ai-case-link:hover{color:#fff}
    .ai-details-grid{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;padding:8px 10px;background:rgba(255,255,255,.025);border-radius:8px;border:1px solid rgba(255,255,255,.06)}
    .ai-detail-item{font-size:11px;color:#94a3b8;line-height:1.5;flex-basis:48%}
    .ai-tip{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);border-radius:7px;padding:6px 10px;margin-top:8px;font-size:11.5px;color:#e2e8f0}
    .ai-did-you-mean{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
    .ai-suggest-term{padding:4px 11px;border-radius:99px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);font-size:11px;color:#60a5fa;cursor:pointer;transition:all .15s}
    .ai-suggest-term:hover{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.5)}
    .ai-panel-footer{padding:6px 14px;font-size:10px;color:#475569;border-top:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:space-between}
    .ai-cursor{display:inline-block;width:2px;height:12px;background:#60a5fa;animation:blink .8s infinite;vertical-align:middle;margin-left:2px}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}

    /* ── FILTER BAR ── */
    .filter-bar{display:none;align-items:center;gap:8px;padding:0 20px 8px;flex-shrink:0;flex-wrap:wrap}
    .filter-bar.visible{display:flex}
    .filter-bar select,.filter-bar input{
      background:#111827;border:1px solid rgba(255,255,255,.09);
      border-radius:8px;color:#e2e8f0;font-size:11px;font-family:inherit;
      padding:5px 10px;outline:none;transition:border-color .15s;
    }
    .filter-bar select:focus,.filter-bar input:focus{border-color:rgba(59,130,246,.45)}
    .filter-bar input::placeholder{color:#475569}
    .filter-results-count{font-size:11px;color:#475569;margin-left:auto}

    /* ── SEARCH HISTORY ── */
    .history-section{padding:0 20px 6px;flex-shrink:0;display:none}
    .history-section.visible{display:block}
    .history-label{font-size:9px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
    .history-clear-btn{font-size:9px;color:#475569;cursor:pointer;background:none;border:none;font-family:inherit;padding:0;transition:color .15s}
    .history-clear-btn:hover{color:#f43f5e}
    .history-chips{display:flex;flex-wrap:wrap;gap:5px}
    .history-chip{
      padding:4px 10px;border-radius:99px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
      font-size:10px;color:#94a3b8;cursor:pointer;
      transition:all .15s;display:flex;align-items:center;gap:5px;
    }
    .history-chip:hover{border-color:rgba(59,130,246,.4);color:#60a5fa}

    /* ── RESULTS BODY ── */
    .se2-body{flex:1;overflow-y:auto;padding:12px 20px 24px;min-height:0}
    .se2-body::-webkit-scrollbar{width:4px}
    .se2-body::-webkit-scrollbar-track{background:transparent}
    .se2-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:99px}

    /* ── EMPTY STATE ── */
    .empty-state{
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;min-height:260px;gap:14px;
      text-align:center;padding:24px;
    }
    .empty-icon{
      width:72px;height:72px;border-radius:22px;
      background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(124,58,237,.12));
      border:1px solid rgba(59,130,246,.15);
      display:flex;align-items:center;justify-content:center;margin-bottom:4px;
    }
    .empty-icon svg{width:30px;height:30px;color:#3b82f6}
    .empty-title{font-size:20px;font-weight:800;color:#f1f5f9;letter-spacing:-.02em}
    .empty-sub{font-size:13px;color:#475569;max-width:460px;line-height:1.7}
    .empty-sub strong{color:#60a5fa;font-weight:600}
    .chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:4px}
    .chip{
      padding:6px 14px;border-radius:99px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
      font-size:12px;color:#94a3b8;cursor:pointer;transition:all .18s;
    }
    .chip:hover{border-color:rgba(59,130,246,.4);color:#60a5fa;background:rgba(59,130,246,.06)}

    /* ── RESULTS HEADER ── */
    .results-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:4px 0 10px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:12px;
    }
    .results-count{font-size:12px;color:#475569}
    .results-count strong{color:#f1f5f9}
    .results-count em{color:#60a5fa;font-style:normal}

    /* ── GROUP LABELS ── */
    .group-label{
      font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
      display:flex;align-items:center;gap:8px;margin:18px 0 8px;
    }
    .group-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.05)}
    .se2-group-icon{
      width:26px;height:26px;border-radius:7px;
      display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;
    }
    .se2-group-count{
      font-size:10px;color:#475569;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
      padding:2px 8px;border-radius:99px;font-weight:500;
    }

    /* ── RESULT CARDS ── */
    .result-card{
      background:rgba(255,255,255,.025);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;padding:0;
      margin-bottom:8px;cursor:pointer;
      transition:all .2s;overflow:hidden;
    }
    .result-card:hover{
      background:rgba(255,255,255,.04);
      border-color:rgba(255,255,255,.1);
      box-shadow:0 4px 20px rgba(0,0,0,.3);
    }
    .result-card.expanded{
      background:rgba(255,255,255,.045);
      border-color:rgba(255,255,255,.14);
      box-shadow:0 8px 32px rgba(0,0,0,.35);
    }
    /* Card inner layout */
    .se2-card-inner{display:flex;align-items:flex-start;gap:14px;padding:14px 16px 10px}
    .se2-src-icon{
      width:38px;height:38px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;
    }
    .se2-src-icon svg{width:16px;height:16px;display:block}
    .se2-card-content{flex:1;min-width:0}
    .se2-chevron{color:#334155;flex-shrink:0;margin-top:3px;transition:transform .22s}
    .se2-chevron svg{width:16px;height:16px;display:block}
    .result-card.expanded .se2-chevron{transform:rotate(180deg)}

    /* Meta row */
    .result-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
    .result-cat-badge{
      font-size:10px;font-weight:700;padding:2px 9px;
      border-radius:99px;letter-spacing:.02em;text-transform:none;
    }
    .result-case{
      font-size:10px;font-weight:700;color:#60a5fa;
      font-family:monospace;background:rgba(59,130,246,.1);
      border:1px solid rgba(59,130,246,.2);padding:2px 7px;border-radius:6px;cursor:pointer;
      transition:background .15s;
    }
    .result-case:hover{background:rgba(59,130,246,.18)}
    .result-eu{font-size:10px;color:#94a3b8;display:flex;align-items:center;gap:3px}
    .relevance-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:99px;font-family:monospace;margin-left:auto;flex-shrink:0}
    .rel-high{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.2)}
    .rel-med {background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
    .rel-low {background:rgba(244,63,94,.08);color:#f43f5e;border:1px solid rgba(244,63,94,.15)}
    .result-title{font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:5px;line-height:1.4}
    .result-snippet{font-size:12px;color:#64748b;line-height:1.6;margin-bottom:0}
    mark{background:rgba(250,204,21,.28);color:#fde047;border-radius:2px;padding:0 2px;font-weight:600;font-style:normal}

    /* Footer row */
    .se2-card-footer{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:8px}
    .se2-footer-item{font-size:11px;color:#475569;display:flex;align-items:center;gap:4px}
    .se2-footer-item svg{width:11px;height:11px;flex-shrink:0;opacity:.7}

    /* Expand row */
    .result-expand-row{
      display:flex;align-items:center;gap:8px;
      margin:8px 16px 0;padding:8px 0 12px;
      border-top:1px solid rgba(255,255,255,.04);
    }
    .result-expand-btn{
      font-size:11px;color:#60a5fa;cursor:pointer;
      background:none;border:none;font-family:inherit;padding:0;font-weight:700;
      transition:opacity .15s;display:flex;align-items:center;gap:4px;
    }
    .result-expand-btn:hover{opacity:.75}
    .result-copy-btn{
      font-size:10px;color:#64748b;cursor:pointer;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
      border-radius:6px;padding:3px 9px;font-family:inherit;
      transition:all .15s;margin-left:auto;display:flex;align-items:center;gap:4px;
    }
    .result-copy-btn:hover{color:#60a5fa;border-color:rgba(59,130,246,.35);background:rgba(59,130,246,.06)}
    .result-full-res{display:none;padding:0 16px 14px;font-size:12px;line-height:1.7;color:#cbd5e1;white-space:pre-wrap;word-break:break-word}
    .result-full-res.open{display:block}

    /* ── SKELETON ── */
    .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:14px;color:#475569;font-size:12px}
    .spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.07);border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
    .skeleton-card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:16px;margin-bottom:8px;animation:skpulse 1.4s ease-in-out infinite}
    .skeleton-line{background:rgba(255,255,255,.05);border-radius:5px;height:10px;margin-bottom:8px}
    .skeleton-line.wide{width:72%}.skeleton-line.narrow{width:38%}.skeleton-line.full{width:88%}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes skpulse{0%,100%{opacity:1}50%{opacity:.45}}
    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

    /* ── NO RESULTS ── */
    .no-results{padding:48px 20px;text-align:center;color:#475569}
    .no-results-icon{font-size:36px;opacity:.25;display:block;margin-bottom:14px}
    .no-results-title{font-size:16px;font-weight:700;color:#64748b;margin-bottom:6px}

    /* ── ENTERPRISE TOOLBAR (injected by JS) ── */
    .se2-enterprise-toolbar{display:flex;align-items:center;justify-content:space-between;padding:4px 0 10px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:12px}
  </style>
</head>

<!-- ═══════ RESULTS BODY ═══════ -->
<div class="se2-body" id="body">

</div>

<script src="/js/search_engine_v2.js"></script>
<script src="/js/search_ai_responder.js"></script>
<script>
(function(){
  'use strict';
  var GROUPS={qb:{ids:['e2e3_gateway','alarms','floorplan_screens','firmware','refrigeration','password_credentials','data_reports','temperature_haccp'],label:'QuickBase Cases',color:'#58a6ff'},kb:{ids:[],catRx:/knowledge|guide|manual|instruction|education|training/i,label:'Knowledge Base',color:'#10b981'},parts:{ids:['parts_xr_controllers','parts_xm_controllers','parts_cc200','parts_license_keys','parts_rga_warranty','parts_probes_sensors','parts_sporlan_danfoss','parts_site_supervisor','parts_walmart_jobs','parts_part_number_inquiry','parts_products'],label:'Parts',color:'#f59e0b'},ctrl:{ids:['controller_hardware','site_supervisor','programming'],label:'Controllers',color:'#a78bfa'},net:{ids:['connect_plus'],label:'Connect+ / Net',color:'#22d3ee'},other:{ids:[],label:'Support Records',color:'#f43f5e'}};
  var CHIPS=['E3 offline','Walmart','license key','E2 firmware','Modbus','floor plan','HACCP','XR75','solenoid','probe failure','RGA defective','xweb password'];
  var ID2G={};
  ['qb','kb','parts','ctrl','net'].forEach(function(g){(GROUPS[g].ids||[]).forEach(function(id){ID2G[id]=g;});});
  function getGroup(r){var id=String(r.id||'');if(ID2G[id])return ID2G[id];if(GROUPS.kb.catRx&&GROUPS.kb.catRx.test(r.cat||''))return 'kb';return 'other';}
  var state={all:[],query:'',activeGroup:null,loaded:false,lastResults:[],lastOutput:null,sortBy:'relevance',filterEu:'',acIndex:-1,acItems:[],acVisible:false,expandedCards:{}};
  var engine=typeof SE2Engine!=='undefined'?new SE2Engine():null;
  var ai=typeof SE2AIResponder!=='undefined'?new SE2AIResponder():null;
  var qEl=document.getElementById('q');
  var bodyEl=document.getElementById('body');
  var clearBtn=document.getElementById('clear-btn');
  var totalRow=document.getElementById('total-row');
  var aiPanel=document.getElementById('ai-panel');
  var aiBody=document.getElementById('ai-body');
  var aiSrc=document.getElementById('ai-sources');
  var acDrop=document.getElementById('autocomplete');
  var filterBar=document.getElementById('filter-bar');
  var histSection=document.getElementById('history-section');
  var histChips=document.getElementById('history-chips');
  var statusEl=document.getElementById('search-status');

  function esc(s){return String(s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]||c;});}
  function hl(text,tokens){
    var s=String(text||'');
    if(!tokens||!tokens.length)return esc(s);
    var result=esc(s);
    tokens.forEach(function(t){
      if(!t||t.length<2)return;
      try{result=result.replace(new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>');}catch(e){}
    });
    return result;
  }
  function snippet(text,tokens,maxLen){
    maxLen=maxLen||160;
    var s=String(text||'');
    if(!s)return '';
    var lower=s.toLowerCase();
    var bestPos=0;
    if(tokens&&tokens.length){tokens.forEach(function(t){var idx=lower.indexOf(t);if(idx>=0)bestPos=Math.max(0,idx-50);});}
    var chunk=s.slice(bestPos,bestPos+maxLen);
    if(bestPos>0)chunk='...'+chunk;
    if(bestPos+maxLen<s.length)chunk=chunk+'...';
    return hl(chunk,tokens);
  }
  function relBadge(score,maxScore){
    var pct=maxScore>0?Math.round((score/maxScore)*100):0;
    var cls=pct>=70?'rel-high':pct>=35?'rel-med':'rel-low';
    return '<span class="relevance-badge '+cls+'">'+pct+'%</span>';
  }
  function updateCounts(results){
    var c={qb:0,kb:0,parts:0,ctrl:0,net:0,other:0};
    (results||state.all).forEach(function(item){var r=item.record||item;var g=getGroup(r);c[g]=(c[g]||0)+1;});
    Object.keys(c).forEach(function(g){var el=document.getElementById('cnt-'+g);if(el)el.textContent=c[g].toLocaleString();});
  }
  function updateTotal(results){
    var base=state.all.length;
    if(results){totalRow.innerHTML='<strong>'+base.toLocaleString()+'</strong> indexed &nbsp;&middot;&nbsp; <strong>'+(results.length).toLocaleString()+'</strong> matched';}
    else{totalRow.innerHTML='<strong>'+base.toLocaleString()+'</strong> records indexed &mdash; ready to search';}
  }
  function renderEmpty(){
    var chips=CHIPS.map(function(c){return '<div class="chip" onclick="window.setQuery(''+esc(c)+'')">'+esc(c)+'</div>';}).join('');
    var svgIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
    bodyEl.innerHTML='<div class="empty-state"><div class="empty-icon">'+svgIcon+'</div><div class="empty-title">Search Engine 2</div><div class="empty-sub">Advanced search across <strong>'+state.all.length.toLocaleString()+'</strong> records &mdash; QuickBase cases, Knowledge Base, Parts, Connect+ sites, Controllers, Support Records.<br>TF-IDF ranking &middot; fuzzy matching &middot; synonym expansion &middot; AI-synthesized responses.</div><div class="chips">'+chips+'</div></div>';
  }
  function renderSkeleton(){
    var html='';for(var i=0;i<5;i++)html+='<div class="skeleton-card"><div class="skeleton-line narrow"></div><div class="skeleton-line wide"></div><div class="skeleton-line full"></div></div>';
    bodyEl.innerHTML=html;
  }
  function applyFilters(){state.sortBy=document.getElementById('sort-by').value;state.filterEu=(document.getElementById('filter-eu').value||'').trim().toLowerCase();renderCurrentResults();}
  window.applyFilters=applyFilters;
  function sortedFiltered(scored){
    var arr=scored.slice();
    if(state.filterEu)arr=arr.filter(function(item){return(item.record||item).eu&&(item.record||item).eu.toLowerCase().includes(state.filterEu);});
    if(state.activeGroup)arr=arr.filter(function(item){return getGroup(item.record||item)===state.activeGroup;});
    if(state.sortBy==='newest')arr.sort(function(a,b){return(parseInt((b.record||b).case||0)||0)-(parseInt((a.record||a).case||0)||0);});
    else if(state.sortBy==='oldest')arr.sort(function(a,b){return(parseInt((a.record||a).case||0)||0)-(parseInt((b.record||b).case||0)||0);});
    return arr;
  }
  function renderCurrentResults(){
    if(!state.lastOutput)return;
    var output=state.lastOutput;
    var scored=output.results;
    var parsed=output.parsed;
    var tokens=parsed?(parsed.expanded&&parsed.expanded.length?parsed.expanded:parsed.tokens):[];
    var toDisplay=sortedFiltered(scored);
    var maxScore=scored.length?(scored[0].score||1):1;
    var q=state.query;
    var countEl=document.getElementById('filter-count');
    if(countEl)countEl.textContent=(toDisplay.length!==scored.length)?toDisplay.length.toLocaleString()+' shown':'';
    if(!toDisplay.length){bodyEl.innerHTML='<div class="no-results"><span class="no-results-icon">&#128270;</span><div class="no-results-title">No results match your filters</div><div style="font-size:11px;margin-top:5px;">Try clearing the End User filter or removing category selection.</div></div>';return;}
    var grouped={};
    toDisplay.forEach(function(item){var r=item.record||item;var g=getGroup(r);if(!grouped[g])grouped[g]=[];grouped[g].push(item);});
    var html='<div class="results-header"><div class="results-count">Showing <strong>'+Math.min(toDisplay.length,500).toLocaleString()+'</strong>';
    if(toDisplay.length!==scored.length)html+=' of <strong>'+scored.length.toLocaleString()+'</strong>';
    html+=' results for <em>&ldquo;'+esc(q)+'&rdquo;</em></div></div>';
    var globalIdx=0;
    var LIMIT=80;
    ['qb','parts','ctrl','net','kb','other'].forEach(function(gKey){
      var rows=grouped[gKey];if(!rows||!rows.length)return;
      var grp=GROUPS[gKey];var limited=rows.slice(0,LIMIT);
      html+='<div class="group-label" style="color:'+grp.color+'"><span style="width:7px;height:7px;border-radius:50%;background:'+grp.color+';flex-shrink:0;display:inline-block;box-shadow:0 0 5px '+grp.color+'88;margin-top:1px"></span>'+esc(grp.label)+' &mdash; '+rows.length.toLocaleString()+'</div>';
      limited.forEach(function(item){
        var r=item.record||item;var score=item.score||0;var cardId='card-'+globalIdx;
        var snip=snippet(r.res,tokens,160);var reu=relBadge(score,maxScore);
        html+='<div class="result-card" id="'+cardId+'" onclick="toggleCard(''+cardId+'')">';
        html+='<div class="result-meta"><span class="result-cat-badge" style="color:'+grp.color+';background:'+grp.color+'18;border:1px solid '+grp.color+'35">'+esc(r.cat||grp.label)+'</span>';
        if(r.case)html+='<span class="result-case" onclick="event.stopPropagation();copyCase(''+esc(r.case)+'')" title="Click to copy">#'+esc(r.case)+'</span>';
        if(r.eu)html+='<span class="result-eu">'+hl(r.eu,tokens)+'</span>';
        html+=reu+'</div>';
        html+='<div class="result-title">'+hl(r.title||'(no title)',tokens)+'</div>';
        html+='<div class="result-snippet">'+snip+'</div>';
        html+='<div class="result-expand-row"><button class="result-expand-btn" onclick="event.stopPropagation();toggleCard(''+cardId+'')">&#9660; Show full resolution</button>';
        if(r.case)html+='<button class="result-copy-btn" onclick="event.stopPropagation();copyCase(''+esc(r.case)+'')">&#128203; Copy #'+esc(r.case)+'</button>';
        html+='</div><div class="result-full-res">'+esc(r.res||'')+'</div></div>';
        globalIdx++;
      });
      if(rows.length>LIMIT)html+='<div style="text-align:center;padding:6px;font-size:10px;color:var(--muted);">&hellip;and '+(rows.length-LIMIT).toLocaleString()+' more. Use category filter or add end user name.</div>';
    });
    bodyEl.innerHTML=html;
  }
  var _aiTimer=null;
  function showAIPanel(output,q){
    if(!ai){return;}
    var response=ai.generate(q,output);
    if(aiSrc)aiSrc.textContent=response.sources||'';
    if(aiBody)aiBody.innerHTML='<span class="ai-cursor"></span>';
    if(aiPanel)aiPanel.classList.add('visible');
    clearTimeout(_aiTimer);
    _aiTimer=setTimeout(function(){
      if(aiBody)aiBody.innerHTML=response.html;
      if(aiBody){
        aiBody.querySelectorAll('.ai-suggest-term').forEach(function(el){el.addEventListener('click',function(){window.setQuery(el.getAttribute('data-term')||el.textContent);});});
        aiBody.querySelectorAll('.ai-case-link').forEach(function(el){el.addEventListener('click',function(){window.setQuery(el.getAttribute('data-case')||el.textContent.replace('#',''));});});
      }
    },80);
  }
  function closeAIPanel(){if(aiPanel)aiPanel.classList.remove('visible');}
  window.closeAIPanel=closeAIPanel;
  function copyAIResponse(){var text=aiBody?aiBody.innerText:'';if(navigator.clipboard)navigator.clipboard.writeText(text).then(function(){var btn=document.getElementById('ai-copy-btn');if(btn){btn.textContent='&#10003; Copied!';setTimeout(function(){btn.textContent='&#128203; Copy';},1500);}});}
  window.copyAIResponse=copyAIResponse;
  var _acTimer=null;
  function showAutocomplete(prefix){
    if(!prefix||prefix.length<2||!engine||!engine.ready){hideAutocomplete();return;}
    clearTimeout(_acTimer);
    _acTimer=setTimeout(function(){
      var suggestions=engine.autocomplete(prefix);
      if(!suggestions.length){hideAutocomplete();return;}
      var html='<div class="autocomplete-section">Completions</div>';
      state.acItems=suggestions;state.acIndex=-1;
      var escPrefix=esc(prefix);
      suggestions.forEach(function(s,i){
        var marked=esc(s).replace(new RegExp('('+escPrefix+')','gi'),'<mark>$1</mark>');
        html+='<div class="autocomplete-item" data-ac-idx="'+i+'" onclick="acSelect(''+esc(s)+'')"><span class="autocomplete-icon">&#128269;</span><span class="autocomplete-term">'+marked+'</span></div>';
      });
      acDrop.innerHTML=html;acDrop.classList.add('open');state.acVisible=true;
    },120);
  }
  function hideAutocomplete(){clearTimeout(_acTimer);acDrop.classList.remove('open');state.acVisible=false;state.acIndex=-1;}
  function acSelect(term){qEl.value=term;state.query=term;hideAutocomplete();run();}
  window.acSelect=acSelect;
  function acNavigate(dir){
    if(!state.acVisible||!state.acItems.length)return;
    state.acIndex=Math.max(-1,Math.min(state.acItems.length-1,state.acIndex+dir));
    acDrop.querySelectorAll('.autocomplete-item').forEach(function(el,i){el.classList.toggle('ac-active',i===state.acIndex);});
  }
  function loadHistory(){try{return JSON.parse(localStorage.getItem('se2_history')||'[]');}catch(e){return[];}}
  function saveHistory(term){var h=loadHistory().filter(function(t){return t!==term;});h.unshift(term);h=h.slice(0,20);try{localStorage.setItem('se2_history',JSON.stringify(h));}catch(e){}}
  function renderHistory(){
    var h=loadHistory();if(!h.length){histSection.classList.remove('visible');return;}
    histChips.innerHTML=h.slice(0,10).map(function(t){return '<div class="history-chip" onclick="window.setQuery(''+esc(t)+'')"><span style="font-size:9px;opacity:.6">&#128336;</span>'+esc(t)+'</div>';}).join('');
    histSection.classList.add('visible');
  }
  function clearHistory(){try{localStorage.removeItem('se2_history');}catch(e){}histSection.classList.remove('visible');}
  window.clearHistory=clearHistory;
  window.toggleCard=function(cardId){
    var card=document.getElementById(cardId);if(!card)return;
    var resEl=card.querySelector('.result-full-res');var btnEl=card.querySelector('.result-expand-btn');
    var isOpen=resEl&&resEl.classList.contains('open');
    if(isOpen){if(resEl)resEl.classList.remove('open');if(btnEl)btnEl.innerHTML='&#9660; Show full resolution';card.classList.remove('expanded');}
    else{if(resEl)resEl.classList.add('open');if(btnEl)btnEl.innerHTML='&#9650; Collapse';card.classList.add('expanded');}
  };
  window.copyCase=function(caseNum){if(!caseNum)return;if(navigator.clipboard)navigator.clipboard.writeText(String(caseNum));};
  window.filterGroup=function(g){
    if(state.activeGroup===g){state.activeGroup=null;document.querySelectorAll('.cat-card').forEach(function(c){c.classList.remove('active');});}
    else{state.activeGroup=g;document.querySelectorAll('.cat-card').forEach(function(c){c.classList.toggle('active',c.dataset.g===g);});}
    if(state.query)renderCurrentResults();else run();
  };
  window.setQuery=function(val){qEl.value=val;state.query=val;hideAutocomplete();run();qEl.focus();};
  window.clearSearch=function(){qEl.value='';state.query='';state.activeGroup=null;document.querySelectorAll('.cat-card').forEach(function(c){c.classList.remove('active');});closeAIPanel();filterBar.classList.remove('visible');hideAutocomplete();run();qEl.focus();};
  var _runTimer=null;
  function run(){
    var q=state.query.trim();
    clearBtn.style.display=q?'':'none';
    if(!state.loaded)return;
    if(!q){state.lastOutput=null;state.lastResults=[];closeAIPanel();filterBar.classList.remove('visible');updateCounts(null);updateTotal(null);renderEmpty();renderHistory();document.querySelectorAll('.cat-card').forEach(function(c){c.classList.remove('active');});state.activeGroup=null;return;}
    histSection.classList.remove('visible');saveHistory(q);renderSkeleton();
    clearTimeout(_runTimer);
    _runTimer=setTimeout(function(){
      var output;
      if(engine&&engine.ready){output=engine.search(q);}
      else{
        // Fallback basic search if engine not loaded
        var t=q.trim().toLowerCase();
        var results=state.all.filter(function(r){return[r.title,r.res,r.cat,r.case,r.eu,r.id].join(' ').toLowerCase().includes(t);});
        output={results:results.map(function(r){return{record:r,score:1};}),parsed:{original:q,tokens:[t],expanded:[t],type:'keyword'},fuzzyTerms:[]};
      }
      state.lastOutput=output;state.lastResults=output.results;
      updateCounts(output.results);updateTotal(output.results);
      filterBar.classList.add('visible');
      showAIPanel(output,q);
      renderCurrentResults();
    },60);
  }
  document.addEventListener('keydown',function(e){
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();qEl.focus();qEl.select();}
    if(e.key==='/'&&document.activeElement!==qEl&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){e.preventDefault();qEl.focus();}
    if(e.key==='Escape'){if(state.acVisible){hideAutocomplete();return;}clearSearch();}
    if(state.acVisible){
      if(e.key==='ArrowDown'){e.preventDefault();acNavigate(1);}
      else if(e.key==='ArrowUp'){e.preventDefault();acNavigate(-1);}
      else if(e.key==='Enter'&&state.acIndex>=0){e.preventDefault();var sel=state.acItems[state.acIndex];if(sel)acSelect(sel);}
    }
  });
  /* ── ENTERPRISE: update indexed count badge in header ── */
  var _origUpdateTotal = updateTotal;
  // Sync the se2-indexed-count badge
  function _updateIndexedBadge(){
    var el=document.getElementById('se2-indexed-count');
    if(el&&state.all.length)el.textContent=state.all.length.toLocaleString()+' records';
  }

  /* ── ENTERPRISE: Toolbar (view toggle + sort) injected before results ── */
  var _se2CurrentSort = 'relevance';
  var _se2CurrentView = 'grouped';
  function _injectToolbar(q, total, shown){
    var existing = document.querySelector('.se2-enterprise-toolbar');
    if(existing) existing.remove();
    var tb = document.createElement('div');
    tb.className = 'results-header se2-enterprise-toolbar';
    tb.innerHTML =
      '<div class="results-count">Showing <strong>'+Math.min(shown,500).toLocaleString()+'</strong> results for <em>&ldquo;'+q.replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]||c;})+' &rdquo;</em></div>'+
      '<div class="se2-toolbar-right">'+
        '<button class="se2-view-btn active" id="se2-vbtn-grouped" title="Grouped view" onclick="window._se2SetView(\'grouped\')">'+
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="4" rx="1"/><rect x="3" y="10" width="7" height="4" rx="1"/><rect x="3" y="17" width="7" height="4" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>'+
        '</button>'+
        '<button class="se2-view-btn" id="se2-vbtn-list" title="List view" onclick="window._se2SetView(\'list\')">'+
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>'+
        '</button>'+
        '<div class="se2-vdivider"></div>'+
        '<button class="se2-sort-btn" id="se2-sort-toggle" onclick="window._se2CycleSort()">'+
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/><polyline points="5 12 12 5 19 12"/></svg>'+
          '<span id="se2-sort-label">Relevance</span>'+
        '</button>'+
      '</div>';
    bodyEl.insertBefore(tb, bodyEl.firstChild);
  }
  window._se2SetView = function(v){
    _se2CurrentView = v;
    var gb=document.getElementById('se2-vbtn-grouped');
    var lb=document.getElementById('se2-vbtn-list');
    if(gb) gb.classList.toggle('active', v==='grouped');
    if(lb) lb.classList.toggle('active', v==='list');
    document.querySelectorAll('.group-label').forEach(function(el){
      el.style.display = (v==='list') ? 'none' : '';
    });
  };
  window._se2CycleSort = function(){
    var sortEl=document.getElementById('sort-by');
    var labelEl=document.getElementById('se2-sort-label');
    if(!sortEl) return;
    var opts=['relevance','newest','oldest'];
    var labels=['Relevance','Case # ↑','Case # ↓'];
    var cur=opts.indexOf(sortEl.value);
    var next=(cur+1)%opts.length;
    sortEl.value=opts[next];
    if(labelEl) labelEl.textContent=labels[next];
    applyFilters();
  };

  /* ── ENTERPRISE: Upgrade card appearance by post-processing rendered HTML ── */
  var _se2GroupColors={qb:'#3b82f6',kb:'#10b981',parts:'#f59e0b',ctrl:'#a855f7',net:'#06b6d4',other:'#f43f5e'};
  var _se2GroupIcons={qb:'🔗',kb:'📚',parts:'🔩',ctrl:'🖥️',net:'📡',other:'📋'};

  function _se2EnhanceRenderedCards(){
    // Wrap result-card content in se2-card-inner flex layout
    document.querySelectorAll('.result-card').forEach(function(card){
      if(card.querySelector('.se2-card-inner')) return; // already done
      var inner = document.createElement('div');
      inner.className = 'se2-card-inner';

      // Detect accent from cat badge
      var badge = card.querySelector('.result-cat-badge');
      var color = badge ? (badge.style.color||'#64748b') : '#64748b';

      // Source icon
      var icon = document.createElement('div');
      icon.className = 'se2-src-icon';
      icon.style.background = color.replace('rgb','rgba').replace(')',',0.12)');
      icon.style.color = color;
      icon.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';

      // Content wrapper
      var content = document.createElement('div');
      content.className = 'se2-card-content';

      // Move existing content into content wrapper
      while(card.firstChild){ content.appendChild(card.firstChild); }

      // Chevron
      var chev = document.createElement('div');
      chev.className = 'se2-chevron';
      chev.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';

      inner.appendChild(icon);
      inner.appendChild(content);
      inner.appendChild(chev);
      card.appendChild(inner);

      // Style the expand-row
      var expRow = card.querySelector('.result-expand-row');
      if(expRow) content.appendChild(expRow);

      // Full resolution — move inside content
      var fullRes = card.querySelector('.result-full-res');
      if(fullRes) content.appendChild(fullRes);
    });

    // Enhance group-labels with icon
    document.querySelectorAll('.group-label').forEach(function(gl){
      if(gl.querySelector('.se2-group-icon')) return;
      var color = gl.style.color || '#64748b';
      var gKey = Object.keys(_se2GroupColors).find(function(k){ return _se2GroupColors[k]===color; }) || 'other';
      // Extract count from last text
      var text = gl.textContent;
      var countMatch = text.match(/(\d[\d,]*)\s*$/) || ['',''];
      var label = text.replace(/\s*\d[\d,]*\s*$/, '').replace(/—\s*/,'').trim();
      gl.innerHTML =
        '<div class="se2-group-icon" style="background:'+color.replace('rgb','rgba').replace(')',',0.12)')+';color:'+color+'">'+_se2GroupIcons[gKey]+'</div>'+
        '<span style="color:'+color+';font-size:15px;font-weight:700;">'+label+'</span>'+
        '<span class="se2-group-count">'+countMatch[0]+'</span>';
    });
  }

  /* ── Hook into renderCurrentResults to inject toolbar + enhance cards ── */
  var _origRenderResults = window.renderCurrentResults || function(){};
  // We observe body mutations to enhance after render
  if(typeof MutationObserver !== 'undefined'){
    var _se2Observer = new MutationObserver(function(mutations){
      var anyAdded = mutations.some(function(m){ return m.addedNodes.length>0; });
      if(!anyAdded) return;
      var q = state.query;
      var results = state.lastResults;
      if(q && results && results.length){
        _se2EnhanceRenderedCards();
        // Inject toolbar if not yet there
        if(!document.querySelector('.se2-enterprise-toolbar')){
          _injectToolbar(q, results.length, Math.min(results.length,500));
        }
      }
      _updateIndexedBadge();
    });
    _se2Observer.observe(bodyEl, {childList:true, subtree:true});
  }

  qEl.addEventListener('blur',function(){setTimeout(hideAutocomplete,180);});
  statusEl.style.display='inline';statusEl.textContent='Loading…';
  fetch('/support_records_kb.json')
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(j){
      var records=Array.isArray(j.flat)?j.flat:[];
      statusEl.textContent='Building index…';
      setTimeout(function(){
        if(engine)engine.build(records);
        state.all=records;state.loaded=true;statusEl.style.display='none';
        updateCounts(null);updateTotal(null);renderEmpty();renderHistory();qEl.focus();
      },10);
    })
    .catch(function(err){
      statusEl.style.display='none';
      ['qb','kb','parts','ctrl','net','other'].forEach(function(g){var el=document.getElementById('cnt-'+g);if(el)el.textContent='—';});
      totalRow.textContent='Failed to load data';
      bodyEl.innerHTML='<div class="no-results"><span class="no-results-icon">⚠️</span><div class="no-results-title">Failed to load support_records_kb.json</div><div style="font-size:12px;margin-top:6px;color:#f85149;">'+esc(String(err.message))+'</div></div>';
    });
})();
</script>
